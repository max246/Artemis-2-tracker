name: Refresh trajectory data

on:
  schedule:
    - cron: '0 */1 * * *' # every hour
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel rebuild
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
